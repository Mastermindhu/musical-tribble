<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yadav Dynasty - Cinema Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: #000; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        /* Header Jo professional lagega */
        .top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 20px;
            pointer-events: none; /* Isse player ke piche ke buttons click ho payenge */
        }
        .brand {
            color: #ff0000;
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .container {
            width: 100%;
            height: 100vh;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="top-bar">
        <div class="brand">YADAV DYNASTY PRIVATE PLAYER</div>
    </div>

    <div class="container">
        <!-- sandbox hatane se saare features (settings, quality, subtitles) kaam karenge -->
        <iframe 
            src="https://streamimdb.me" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true"
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            scrolling="no">
        </iframe>
    </div>

    <script>
        // Taaki wo 'View Source' karke link na dekh le
        document.onkeydown = function(e) {
            if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</body>
</html>
